{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}

{% block content %}
<div class="error-page" id="error-500">
  <div class="error-content">
    <div class="error-code">500</div>
    <div class="error-glyph"><i class="bi bi-exclamation-octagon-fill text-danger"></i></div>
    <h1 class="error-title">Internal Server Error</h1>
    <p class="error-message text-muted">
      Something went wrong on our end. The error has been logged and our team has been notified.
      Please try again in a moment.
    </p>
    <div class="d-flex gap-3 justify-content-center mt-4">
      <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary btn-glow" id="btn-go-home-500">
        <i class="bi bi-house-fill me-2"></i>Go to Dashboard
      </a>
      <a href="/health" class="btn btn-outline-secondary" id="btn-check-health" target="_blank">
        <i class="bi bi-heart-pulse me-2"></i>System Health
      </a>
    </div>
  </div>
</div>
{% endblock %}
