{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}

{% block content %}
<div class="error-page" id="error-404">
  <div class="error-content">
    <div class="error-code">404</div>
    <div class="error-glyph"><i class="bi bi-compass"></i></div>
    <h1 class="error-title">Page not found</h1>
    <p class="error-message text-muted">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <div class="d-flex gap-3 justify-content-center mt-4">
      <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary btn-glow" id="btn-go-home">
        <i class="bi bi-house-fill me-2"></i>Go to Dashboard
      </a>
      <a href="{{ url_for('tasks.index') }}" class="btn btn-outline-secondary" id="btn-go-tasks">
        <i class="bi bi-check2-square me-2"></i>My Tasks
      </a>
    </div>
  </div>
</div>
{% endblock %}
